        // 格式化数字，添加千位分隔符
        function formatNumber(num) {

        // 渲染产品数据
        function renderProductData() {
            const container = document.getElementById('metricsData');
            container.innerHTML = '';
            
            // 创建数据容器
            const dataContainer = document.createElement('div');
            dataContainer.className = 'data-container';
            container.appendChild(dataContainer);
            
            // 生成HTML - 确保与标题相同的列结构
            dataContainer.innerHTML = products.map(item => `
                <div class="data-row">
                    <span>${item.name}</span>
                    <span>${formatNumber(item.sales)}</span>
                    <span>${item.growth}</span>
                    <span>${item.rating}%</span>
                </div>
            `).join('');
            
            // 滑动相关变量
            let isDragging = false;
            let startY = 0;
            let scrollTop = 0;
            let currentPosition = 0;
            const rowHeight = 30;
            const visibleRows = 5; // 可视区域显示的行数
            const maxPosition = Math.max(0, (products.length - visibleRows) * rowHeight);
            
            // 更新位置函数
            function updatePosition(newPosition) {
                // 限制滑动范围
                newPosition = Math.max(0, Math.min(newPosition, maxPosition));
                
                // 确保不会滑动到最后一个文本之后
                const maxAllowedPosition = (products.length - visibleRows-1.5) * rowHeight;
                if (maxAllowedPosition > 0) {
                    newPosition = Math.min(newPosition, maxAllowedPosition);
                } else {
                    newPosition = 0; // 如果数据不足以填满可视区域，则不允许滑动
                }
                
                currentPosition = newPosition;
                dataContainer.style.transform = `translateY(-${currentPosition}px)`;
            }
            
            // 平滑滑动到目标位置
            function smoothScrollTo(targetPosition) {
                // 计算最大允许位置
                const maxAllowedPosition = (products.length - visibleRows) * rowHeight;
                
                // 确保目标位置不超过最大允许位置
                if (maxAllowedPosition > 0) {
                    targetPosition = Math.min(targetPosition, maxAllowedPosition);
                } else {
                    targetPosition = 0;
                }
                
                dataContainer.style.transition = 'transform 0.3s ease-out';
                updatePosition(targetPosition);
                
                // 移除过渡效果，以便下次拖动时立即响应
                setTimeout(() => {
                    dataContainer.style.transition = 'none';
                }, 300);
            }
            
            // 鼠标拖动滑动功能
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.pageY - container.offsetTop;
                scrollTop = currentPosition;
                container.classList.add('grabbing');
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const y = e.pageY - container.offsetTop;
                const walk = (y - startY) * 2; // 乘以2增加滑动灵敏度
                updatePosition(scrollTop - walk);
            });
            
            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                
                isDragging = false;
                container.classList.remove('grabbing');
                
                // 计算最近的整行位置
                const targetRow = Math.round(currentPosition / rowHeight);
                smoothScrollTo(targetRow * rowHeight);
            });
            
            // 鼠标滚轮滑动功能
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                // 根据滚轮方向计算新的位置
                const delta = e.deltaY > 0 ? rowHeight : -rowHeight;
                const newPosition = currentPosition + delta;
                
                // 平滑滚动到新位置
                smoothScrollTo(newPosition);
            });
            
            // 防止拖动时选中文本
            container.addEventListener('selectstart', (e) => {
                if (isDragging) {
                    e.preventDefault();
                }
            });
        }
